<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Ilvira Nasreddinova</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="layout">
        <div id="sidebar-placeholder"></div>
        <div id="mobile-header-placeholder"></div>

        <main class="main-content">
            <div class="about-content fade-in">
                <img src="assets/images/Bio.webp" alt="Ilvira Nasreddinova" class="artist-photo"
                    onerror="this.style.display='none'">
                <p class="manifesto" data-i18n="about_bio"></p>

                <div class="exhibitions-section">
                    <h2 data-i18n="about_exhibitions_title">Exhibitions</h2>
                    <div data-i18n="about_exhibitions_list" style="white-space: pre-line;"></div>
                </div>

            </div>
        </main>
    </div>

    <script src="js/components.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
